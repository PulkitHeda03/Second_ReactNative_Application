name: Lint Check

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual dispatch'
        required: false
        default: 'Manual lint run'

jobs:
  lint:
    name: ESLint – React Native
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint on all files
        run: npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings 0
